name: Rolling Release

on:
  workflow_dispatch:
    inputs:
      expected-release:
        description: "Expected next release version (e.g. 3.2.5). Must match the version calculated from main."
        required: true
        type: string

jobs:
  release:
    name: "Validate, commit, and push release"
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.9"
      - name: Install release tools
        run: |
          uv sync --only-group release
      - name: Set up git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
      - name: Create release commits
        id: release
        run: |
          uv run make release VERSION="${{ inputs.expected-release }}"
          # derives the X.Y backport branch from the release version (e.g. 3.3.2 → "3.3", 3.4.0 → "3.4")
          BRANCH=$(uv run python .github/scripts/release_utility.py get backport-branch)
          echo "backport-branch=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Push release
        run: |
          # --atomic ensures all three refs land together or none do.
          # master: the release commit + post-release bump commit.
          # tag: the annotated release tag created locally by rolling-release.
          # backport branch: the X.Y branch created or fast-forwarded by rolling-release.
          git push --atomic origin \
            master \
            "refs/tags/${{ inputs.expected-release }}" \
            "${{ steps.release.outputs.backport-branch }}"
