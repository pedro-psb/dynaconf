name: Release

on:
  workflow_dispatch:
    inputs:
      expected-release:
        description: "Expected next release version (e.g. 3.2.5). Must match the version calculated from main."
        required: true
        type: string

jobs:
  release:
    name: "Validate, commit, and push release"
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.9"
      - name: Install release tools
        run: |
          uv sync --only-group release
      - name: Set up git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
      - name: Create release commits
        run: |
          uv run make release VERSION="${{ inputs.expected-release }}"
      - name: Push to master
        run: |
          git push --follow-tags origin master
