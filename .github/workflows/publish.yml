name: Publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to publish (e.g. 3.2.5)"
        required: true
        type: string

jobs:
  validate:
    name: "Validate release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.9"
      - name: Install release tools
        run: uv sync --only-group release
      - name: Validate release
        run: uv run python .github/scripts/release_utility.py validate --publish "${{ inputs.release-tag || github.ref_name }}"

  build-dist:
    name: "Build distribution"
    needs: [validate]
    uses: ./.github/workflows/build-dist.yml
    with:
      release-tag: ${{ inputs.release-tag || github.ref_name }}

  build-docs:
    name: "Build documentation"
    needs: [validate]
    uses: ./.github/workflows/build-docs.yml
    with:
      release-tag: ${{ inputs.release-tag || github.ref_name }}

  publish-pypi:
    name: "Publish to PyPI"
    needs: [validate, build-dist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dynaconf
    permissions:
      id-token: write
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-dist.outputs.dist-artifact }}
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-github:
    name: "Create GitHub Release"
    needs: [build-docs, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-docs.outputs.release-notes-artifact }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          tag_name: ${{ inputs.release-tag || github.ref_name }}

